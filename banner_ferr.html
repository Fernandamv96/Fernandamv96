
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

.banner-wrap {
  background: #0a0a0a;
  border-radius: 12px;
  padding: 1rem;
  text-align: center;
}

.banner-note {
  font-size: 12px;
  color: var(--color-text-secondary);
  margin-top: 12px;
  font-family: monospace;
}

.dl-btn {
  background: #1a001a;
  border: 1px solid #ff79c6;
  border-radius: 6px;
  color: #ff79c6;
  font-size: 12px;
  padding: 6px 16px;
  cursor: pointer;
  font-family: 'Space Mono', monospace;
  margin-top: 10px;
  transition: all 0.15s;
  display: inline-block;
}
.dl-btn:hover { background: #ff79c6; color: #0a0a0a; }
</style>

<div class="banner-wrap">
<svg width="100%" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
      .glitch-text {
        font-family: 'Space Mono', monospace;
        font-weight: 700;
        font-size: 72px;
        fill: #ff79c6;
      }
      .sub-text {
        font-family: 'Space Mono', monospace;
        font-size: 14px;
        fill: #bd93f9;
        letter-spacing: 6px;
      }
      .tag-text {
        font-family: 'Space Mono', monospace;
        font-size: 11px;
        fill: #00ffcc;
        letter-spacing: 2px;
      }
      @keyframes glitch1 {
        0%, 90%, 100% { transform: translate(0,0); opacity: 1; }
        92% { transform: translate(-3px, 1px); opacity: 0.8; }
        94% { transform: translate(3px, -1px); opacity: 0.9; }
        96% { transform: translate(-2px, 2px); opacity: 0.7; }
        98% { transform: translate(2px, -2px); opacity: 1; }
      }
      @keyframes glitch2 {
        0%, 88%, 100% { transform: translate(0,0); opacity: 0; }
        90% { transform: translate(4px, -2px); opacity: 0.4; fill: #00ffcc; }
        93% { transform: translate(-4px, 2px); opacity: 0.3; fill: #ff2d78; }
        96% { opacity: 0; }
      }
      @keyframes scanline {
        0% { transform: translateY(-200px); }
        100% { transform: translateY(200px); }
      }
      @keyframes flicker {
        0%, 97%, 100% { opacity: 1; }
        98% { opacity: 0.4; }
        99% { opacity: 0.8; }
      }
      @keyframes blink {
        0%, 49% { opacity: 1; }
        50%, 100% { opacity: 0; }
      }
      @keyframes pulse-border {
        0%, 100% { stroke-opacity: 0.4; }
        50% { stroke-opacity: 1; }
      }
      .main-group { animation: flicker 4s ease-in-out infinite; }
      .glitch-main { animation: glitch1 3s ease-in-out infinite; }
      .glitch-clone { animation: glitch2 3s ease-in-out infinite; }
      .cursor { animation: blink 1s step-end infinite; }
      .border-top { animation: pulse-border 2s ease-in-out infinite; }
      .border-bot { animation: pulse-border 2s ease-in-out infinite 1s; }
    </style>

    <clipPath id="banner-clip">
      <rect width="800" height="200" rx="8"/>
    </clipPath>
  </defs>

  <rect width="800" height="200" fill="#0a0a0a" rx="8"/>

  <rect x="0" y="0" width="800" height="1" fill="#ff79c6" opacity="0.3" class="border-top"/>
  <rect x="0" y="199" width="800" height="1" fill="#ff79c6" opacity="0.3" class="border-bot"/>

  <g clip-path="url(#banner-clip)">
    <line x1="0" y1="40" x2="800" y2="40" stroke="#ff79c6" stroke-width="0.3" opacity="0.08"/>
    <line x1="0" y1="80" x2="800" y2="80" stroke="#ff79c6" stroke-width="0.3" opacity="0.08"/>
    <line x1="0" y1="120" x2="800" y2="120" stroke="#ff79c6" stroke-width="0.3" opacity="0.08"/>
    <line x1="0" y1="160" x2="800" y2="160" stroke="#ff79c6" stroke-width="0.3" opacity="0.08"/>
    <line x1="160" y1="0" x2="160" y2="200" stroke="#bd93f9" stroke-width="0.3" opacity="0.06"/>
    <line x1="320" y1="0" x2="320" y2="200" stroke="#bd93f9" stroke-width="0.3" opacity="0.06"/>
    <line x1="480" y1="0" x2="480" y2="200" stroke="#bd93f9" stroke-width="0.3" opacity="0.06"/>
    <line x1="640" y1="0" x2="640" y2="200" stroke="#bd93f9" stroke-width="0.3" opacity="0.06"/>

    <rect x="20" y="20" width="6" height="6" fill="#ff2d78" opacity="0.6"/>
    <rect x="774" y="20" width="6" height="6" fill="#ff2d78" opacity="0.6"/>
    <rect x="20" y="174" width="6" height="6" fill="#ff2d78" opacity="0.6"/>
    <rect x="774" y="174" width="6" height="6" fill="#ff2d78" opacity="0.6"/>

    <g class="main-group">
      <text class="glitch-text glitch-clone" x="400" y="120" text-anchor="middle">Ferr</text>
      <text class="glitch-text glitch-main" x="400" y="120" text-anchor="middle">Ferr</text>
      <text class="sub-text" x="400" y="150" text-anchor="middle">programming &amp; cybersecurity</text>
      <text class="tag-text" x="400" y="172" text-anchor="middle">&lt; hacker girl / she/her / INACAP &gt;</text>
    </g>

    <text font-family="monospace" font-size="11" fill="#ff2d78" opacity="0.4" x="30" y="42">01001000</text>
    <text font-family="monospace" font-size="11" fill="#bd93f9" opacity="0.3" x="30" y="58">10110100</text>
    <text font-family="monospace" font-size="11" fill="#ff2d78" opacity="0.4" x="660" y="42">01101000</text>
    <text font-family="monospace" font-size="11" fill="#bd93f9" opacity="0.3" x="660" y="58">11001010</text>

    <text font-family="monospace" font-size="10" fill="#00ffcc" opacity="0.5" x="30" y="170">~/ferr $</text>
    <rect class="cursor" x="88" y="158" width="7" height="12" fill="#00ffcc" opacity="0.7"/>
  </g>
</svg>

<div class="banner-note">para usarlo en tu README, súbelo a tu repo y referencialo con &lt;img src="..."&gt;</div>
<button class="dl-btn" onclick="downloadSVG()">descargar banner SVG</button>
</div>

<script>
function downloadSVG() {
  const svg = document.querySelector('svg');
  const svgData = new XMLSerializer().serializeToString(svg);
  const blob = new Blob([svgData], {type: 'image/svg+xml'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'banner-ferr.svg';
  a.click();
  URL.revokeObjectURL(url);
}
</script>
