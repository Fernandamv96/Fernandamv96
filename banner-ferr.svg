<svg width="100%" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&amp;display=swap');
    @keyframes pulse{0%,100%{opacity:.3}50%{opacity:.9}}
    @keyframes pulse2{0%,100%{opacity:.15}50%{opacity:.5}}
    @keyframes scan{0%{transform:translateY(-10px)}100%{transform:translateY(210px)}}
    @keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
    @keyframes glitch{0%,89%,100%{transform:translate(0,0);opacity:0}90%{transform:translate(-4px,2px);opacity:.35}94%{transform:translate(4px,-2px);opacity:.25}97%{opacity:0}}
    @keyframes flicker{0%,97%,100%{opacity:1}98%{opacity:.4}99%{opacity:.8}}
    .fm{font-family:'Space Mono',monospace;}
    .p1{animation:pulse 2.5s ease-in-out infinite;}
    .p2{animation:pulse2 3.2s ease-in-out infinite .8s;}
    .p3{animation:pulse 4s ease-in-out infinite 1.5s;}
    .sc{animation:scan 3.5s linear infinite;}
    .cur{animation:blink 1s step-end infinite;}
    .gc{animation:glitch 4s ease-in-out infinite;}
    .fl{animation:flicker 5s ease-in-out infinite;}
  </style>
  <clipPath id="c"><rect width="800" height="200" rx="10"/></clipPath>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#0d0010"/>
    <stop offset="50%" stop-color="#0a0018"/>
    <stop offset="100%" stop-color="#000d1a"/>
  </linearGradient>
  <linearGradient id="sl" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#ff79c6" stop-opacity="0"/>
    <stop offset="50%" stop-color="#ff79c6" stop-opacity="0.07"/>
    <stop offset="100%" stop-color="#ff79c6" stop-opacity="0"/>
  </linearGradient>
</defs>
<rect width="800" height="200" rx="10" fill="url(#bg)"/>
