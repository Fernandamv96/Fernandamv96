<svg width="100%" viewBox="0 0 680 320" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Pixel art computadora rosa con cursor corazón</title>
<desc>Computadora pixel art en tonos rosa/púrpura con cursor en forma de corazón</desc>
<defs>
  <style>
    @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
    @keyframes screenglow { 0%,100%{opacity:1} 50%{opacity:0.85} }
    @keyframes startwinkle { 0%,100%{opacity:1} 50%{opacity:0.2} }
    .blink { animation: blink 1.2s step-end infinite; }
    .float { animation: float 3s ease-in-out infinite; }
    .screengl { animation: screenglow 4s ease-in-out infinite; }
    .star1 { animation: startwinkle 1.8s ease-in-out infinite; }
    .star2 { animation: startwinkle 2.4s ease-in-out infinite 0.6s; }
    .star3 { animation: startwinkle 2s ease-in-out infinite 1.2s; }
  </style>
  <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#2d1b69"/>
    <stop offset="100%" stop-color="#9b34c0"/>
  </linearGradient>
</defs>

